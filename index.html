<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導入事例 自己診断チェックリスト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy: #1a2340;
  --navy-light: #243052;
  --navy-lighter: #2d3d66;
  --gold: #c9a84c;
  --gold-light: #e0c872;
  --gold-dim: rgba(201, 168, 76, 0.15);
  --white: #ffffff;
  --gray-100: #f4f5f7;
  --gray-200: #e2e4e9;
  --gray-400: #9298a5;
  --gray-600: #6b7280;
  --red: #e74c3c;
  --red-bg: rgba(231, 76, 60, 0.08);
  --green: #27ae60;
  --green-bg: rgba(39, 174, 96, 0.08);
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--gray-100);
  color: var(--navy);
  line-height: 1.7;
  min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  color: var(--white);
  padding: 2.5rem 1.5rem 2rem;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 900;
  letter-spacing: 0.04em;
  margin-bottom: 0.3rem;
}

.header h1 span {
  color: var(--gold);
}

.header .subtitle {
  font-size: 0.85rem;
  color: var(--gray-400);
  margin-bottom: 1.2rem;
}

.score-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.score-number {
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--gold);
  min-width: 120px;
}

.score-number small {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--gray-400);
}

.score-bar-wrap {
  flex: 1;
  max-width: 400px;
  min-width: 200px;
}

.score-bar {
  height: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 5px;
  overflow: hidden;
}

.score-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 5px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.score-percent {
  font-size: 0.75rem;
  color: var(--gray-400);
  text-align: right;
  margin-top: 0.2rem;
}

/* Main */
.main {
  max-width: 780px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 0;
  border-bottom: 2px solid var(--gray-200);
}

.tab-btn {
  flex: 1;
  padding: 0.9rem 1rem;
  background: var(--white);
  border: 2px solid var(--gray-200);
  border-bottom: none;
  border-radius: 10px 10px 0 0;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--gray-600);
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  top: 2px;
}

.tab-btn.active {
  color: var(--navy);
  background: var(--white);
  border-color: var(--gold);
  border-bottom-color: var(--white);
  z-index: 1;
}

.tab-btn .tab-count {
  display: inline-block;
  margin-left: 0.4rem;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--gray-400);
}

.tab-btn.active .tab-count {
  color: var(--gold);
}

/* Tab Content */
.tab-content {
  display: none;
  background: var(--white);
  border: 2px solid var(--gray-200);
  border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 1.5rem 1.2rem;
}

.tab-content.active { display: block; }

/* Category Group */
.category-group {
  margin-bottom: 1.8rem;
}

.category-group:last-child { margin-bottom: 0; }

.category-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.8rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--gold-dim);
}

.category-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  background: var(--navy);
  color: var(--gold);
  font-size: 0.8rem;
  font-weight: 700;
  border-radius: 50%;
  flex-shrink: 0;
}

.category-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--navy);
}

.category-count {
  margin-left: auto;
  font-size: 0.75rem;
  color: var(--gray-400);
  white-space: nowrap;
}

/* Checklist Item */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 0.8rem;
  padding: 0.8rem 1rem;
  border-radius: 8px;
  margin-bottom: 0.4rem;
  transition: background 0.3s, opacity 0.3s;
  cursor: pointer;
  user-select: none;
}

.check-item:hover { background: var(--gray-100); }

.check-item.checked {
  background: var(--gold-dim);
  opacity: 0.65;
}

.check-item input[type="checkbox"] {
  display: none;
}

.check-box {
  width: 22px;
  height: 22px;
  border: 2px solid var(--gray-400);
  border-radius: 5px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
  margin-top: 2px;
}

.check-item.checked .check-box {
  background: var(--gold);
  border-color: var(--gold);
}

.check-box svg {
  width: 14px;
  height: 14px;
  stroke: var(--white);
  stroke-width: 3;
  fill: none;
  opacity: 0;
  transform: scale(0);
  transition: all 0.25s;
}

.check-item.checked .check-box svg {
  opacity: 1;
  transform: scale(1);
}

.check-label {
  font-size: 0.9rem;
  line-height: 1.6;
  color: var(--navy);
}

/* Diagnose Button */
.diagnose-section {
  text-align: center;
  margin-top: 2rem;
}

.btn-diagnose {
  display: inline-block;
  padding: 1rem 3rem;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--navy);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1.1rem;
  font-weight: 900;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(201, 168, 76, 0.4);
}

.btn-diagnose:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(201, 168, 76, 0.5);
}

.btn-diagnose:active { transform: translateY(0); }

/* Result Panel */
.result-panel {
  display: none;
  margin-top: 2rem;
  animation: fadeSlideUp 0.6s ease-out;
}

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-card {
  background: var(--white);
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
  overflow: hidden;
}

.rank-banner {
  padding: 2.5rem 1.5rem;
  text-align: center;
  color: var(--white);
}

.rank-banner.rank-a { background: linear-gradient(135deg, #1a6b3c, #27ae60); }
.rank-banner.rank-b { background: linear-gradient(135deg, #1a5276, #2e86c1); }
.rank-banner.rank-c { background: linear-gradient(135deg, #7d5a00, #c9a84c); }
.rank-banner.rank-d { background: linear-gradient(135deg, #922b21, #e74c3c); }

.rank-label {
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 0.5rem;
}

.rank-letter {
  font-size: 5rem;
  font-weight: 900;
  line-height: 1;
  animation: rankPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
}

@keyframes rankPop {
  from { opacity: 0; transform: scale(0.3); }
  to { opacity: 1; transform: scale(1); }
}

.rank-message {
  font-size: 1rem;
  margin-top: 0.8rem;
  opacity: 0.9;
  line-height: 1.6;
}

.result-body { padding: 1.5rem; }

.result-section {
  margin-bottom: 1.5rem;
}

.result-section:last-child { margin-bottom: 0; }

.result-section-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.priority-area {
  background: var(--red-bg);
  border-left: 4px solid var(--red);
  border-radius: 0 8px 8px 0;
  padding: 1rem;
  margin-bottom: 0.8rem;
}

.priority-area .area-title {
  font-weight: 700;
  color: var(--red);
  font-size: 0.9rem;
  margin-bottom: 0.4rem;
}

.cleared-area {
  background: var(--green-bg);
  border-left: 4px solid var(--green);
  border-radius: 0 8px 8px 0;
  padding: 0.8rem 1rem;
  margin-bottom: 0.5rem;
  font-size: 0.85rem;
  color: var(--green);
  font-weight: 700;
}

.improve-list {
  list-style: none;
  padding: 0;
}

.improve-list li {
  font-size: 0.85rem;
  color: var(--gray-600);
  padding: 0.5rem 0;
  padding-left: 1.2rem;
  position: relative;
  line-height: 1.8;
  margin-bottom: 0.3rem;
}

.improve-list li::before {
  content: '>';
  position: absolute;
  left: 0;
  color: var(--red);
  font-weight: 700;
}

/* CTA */
.result-cta {
  text-align: center;
  padding: 1.5rem;
  background: var(--gray-100);
  border-radius: 0 0 16px 16px;
}

.result-cta p {
  font-size: 0.9rem;
  color: var(--gray-600);
  margin-bottom: 1rem;
  line-height: 1.6;
}

.btn-cta {
  display: inline-block;
  padding: 0.9rem 2.5rem;
  background: var(--navy);
  color: var(--gold);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(26, 35, 64, 0.3);
}

.btn-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(26, 35, 64, 0.4);
}

.cta-note {
  font-size: 0.78rem !important;
  color: var(--gray-400) !important;
  margin-top: 0.8rem !important;
  margin-bottom: 0 !important;
  line-height: 1.6;
}

.btn-pdf {
  display: inline-block;
  padding: 0.8rem 2rem;
  background: var(--white);
  color: var(--navy);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  border: 2px solid var(--gold);
  border-radius: 50px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  box-shadow: 0 2px 10px rgba(201, 168, 76, 0.2);
  margin-bottom: 1.2rem;
}

.btn-pdf:hover {
  background: var(--gold-dim);
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
}

/* Reset button */
.reset-section {
  text-align: center;
  margin-top: 1.5rem;
}

.btn-reset {
  background: none;
  border: 1px solid var(--gray-400);
  color: var(--gray-600);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  padding: 0.5rem 1.5rem;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-reset:hover {
  border-color: var(--navy);
  color: var(--navy);
}

/* Responsive */
@media (max-width: 600px) {
  .header { padding: 1.8rem 1rem 1.5rem; }
  .header h1 { font-size: 1.2rem; }
  .score-number { font-size: 1.5rem; min-width: auto; }
  .score-bar-wrap { min-width: 150px; }
  .tab-btn { font-size: 0.85rem; padding: 0.7rem 0.5rem; }
  .tab-content { padding: 1rem 0.8rem; }
  .check-item { padding: 0.7rem 0.6rem; gap: 0.6rem; }
  .rank-letter { font-size: 3.5rem; }
  .btn-diagnose { padding: 0.9rem 2rem; font-size: 1rem; }
}

</style>
</head>
<body>

<header class="header">
  <h1><span>導入事例</span> 自己診断チェックリスト</h1>
  <p class="subtitle">貴社の記事は「読まれて終わり」になっていませんか？</p>
  <div class="score-display">
    <div class="score-number"><span id="scoreCount">0</span> <small>/ 22項目</small></div>
    <div class="score-bar-wrap">
      <div class="score-bar"><div class="score-bar-fill" id="scoreBarFill"></div></div>
      <div class="score-percent" id="scorePercent">0%</div>
    </div>
  </div>
</header>

<main class="main">
  <div class="tabs">
    <button class="tab-btn active" data-tab="outside">本文以外<span class="tab-count" id="outsideCount">0/10</span></button>
    <button class="tab-btn" data-tab="inside">本文内<span class="tab-count" id="insideCount">0/12</span></button>
  </div>

  <!-- 本文以外 -->
  <div class="tab-content active" id="tab-outside">
    <!-- タイトル -->
    <div class="category-group" data-category="タイトル">
      <div class="category-header">
        <span class="category-number">1</span>
        <span class="category-title">タイトル</span>
        <span class="category-count" data-cat-count="タイトル">0/3</span>
      </div>
      <label class="check-item" data-group="outside" data-category="タイトル" data-id="t1">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">ベネフィット（読者が得られる価値）が明示されている</span>
      </label>
      <label class="check-item" data-group="outside" data-category="タイトル" data-id="t2">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">読者が新しいと感じる情報、または好奇心を刺激する要素がある（数字・意外性・問いかけなど）</span>
      </label>
      <label class="check-item" data-group="outside" data-category="タイトル" data-id="t3">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">設定したペルソナが読んだとき「自分の話だ」と感じられるタイトルになっている</span>
      </label>
    </div>

    <!-- リード文（導入文） -->
    <div class="category-group" data-category="リード文（導入文）">
      <div class="category-header">
        <span class="category-number">2</span>
        <span class="category-title">リード文（導入文）</span>
        <span class="category-count" data-cat-count="リード文（導入文）">0/2</span>
      </div>
      <label class="check-item" data-group="outside" data-category="リード文（導入文）" data-id="l1">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">冒頭3段落以内に「誰の・どんな課題が・どう解決されたか」が明示されている</span>
      </label>
      <label class="check-item" data-group="outside" data-category="リード文（導入文）" data-id="l2">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">読者（ペルソナ）が「自分に関係のある話だ」と感じられる入り口になっている</span>
      </label>
    </div>

    <!-- 締め・CTA -->
    <div class="category-group" data-category="締め・CTA">
      <div class="category-header">
        <span class="category-number">3</span>
        <span class="category-title">締め・CTA</span>
        <span class="category-count" data-cat-count="締め・CTA">0/2</span>
      </div>
      <label class="check-item" data-group="outside" data-category="締め・CTA" data-id="c1">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">記事末尾に次のアクション（問い合わせ・資料請求など）への導線がある</span>
      </label>
      <label class="check-item" data-group="outside" data-category="締め・CTA" data-id="c2">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">CTAが記事の内容・感情の流れと自然につながっている</span>
      </label>
    </div>

    <!-- 信頼性・証拠 -->
    <div class="category-group" data-category="信頼性・証拠">
      <div class="category-header">
        <span class="category-number">4</span>
        <span class="category-title">信頼性・証拠</span>
        <span class="category-count" data-cat-count="信頼性・証拠">0/2</span>
      </div>
      <label class="check-item" data-group="outside" data-category="信頼性・証拠" data-id="r1">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">顧客企業の情報（業種・規模・担当者名）が明記されている</span>
      </label>
      <label class="check-item" data-group="outside" data-category="信頼性・証拠" data-id="r2">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">担当者の生の言葉（引用）が含まれている</span>
      </label>
    </div>

    <!-- 可読性・全体構成 -->
    <div class="category-group" data-category="可読性・全体構成">
      <div class="category-header">
        <span class="category-number">5</span>
        <span class="category-title">可読性・全体構成</span>
        <span class="category-count" data-cat-count="可読性・全体構成">0/1</span>
      </div>
      <label class="check-item" data-group="outside" data-category="可読性・全体構成" data-id="v1">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">見出し構成が論理的で、流し読みでも内容が把握できる</span>
      </label>
    </div>
  </div>

  <!-- 本文内 -->
  <div class="tab-content" id="tab-inside">
    <!-- 課題設定 -->
    <div class="category-group" data-category="課題設定">
      <div class="category-header">
        <span class="category-number">6</span>
        <span class="category-title">課題設定</span>
        <span class="category-count" data-cat-count="課題設定">0/2</span>
      </div>
      <label class="check-item" data-group="inside" data-category="課題設定" data-id="p1">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">導入前の課題が具体的かつ感情的に描写されている</span>
      </label>
      <label class="check-item" data-group="inside" data-category="課題設定" data-id="p2">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">課題の原因・背景（なぜそうなったか）まで掘り下げられている</span>
      </label>
    </div>

    <!-- 選んだ背景 -->
    <div class="category-group" data-category="選んだ背景">
      <div class="category-header">
        <span class="category-number">7</span>
        <span class="category-title">選んだ背景</span>
        <span class="category-count" data-cat-count="選んだ背景">0/2</span>
      </div>
      <label class="check-item" data-group="inside" data-category="選んだ背景" data-id="s1">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">他社ではなくこのサービスを選んだ理由・経緯が書かれている</span>
      </label>
      <label class="check-item" data-group="inside" data-category="選んだ背景" data-id="s2">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">選定時の迷い・比較・判断プロセスが描写されている</span>
      </label>
    </div>

    <!-- 効果・成果 -->
    <div class="category-group" data-category="効果・成果">
      <div class="category-header">
        <span class="category-number">8</span>
        <span class="category-title">効果・成果</span>
        <span class="category-count" data-cat-count="効果・成果">0/2</span>
      </div>
      <label class="check-item" data-group="inside" data-category="効果・成果" data-id="e1">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>

      </label>
      <label class="check-item" data-group="inside" data-category="効果・成果" data-id="e2">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>

      <label class="check-item" data-group="inside" data-category="ペルソナへの刺さり方" data-id="pe1">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="check-label">想定読者（業界・職種・課題）が明確に意識された表現になっている</span>
      </label>
      <label class="check-item" data-group="inside" data-category="ペルソナへの刺さり方" data-id="pe2">
        <input type="checkbox"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>

        <div class="rank-letter" id="rankLetter"></div>

      <div class="result-body" id="resultBody"></div>

        <button class="btn-pdf" id="btnPdf">📄 診断結果をPDFで保存する</button>
        <p>改善の優先順位と次の打ち手を、15分で確定します。</p>
        <a href="https://writer-matsudo.com/?page_id=1661" target="_blank" rel="noopener" class="btn-cta">15分の意思決定支援を予約する</a>
      </div>

</main>

<script>
(function() {
  const TOTAL = 22;

  const diagnosticComments = {
    "t1": "課題：読者が得られる価値（ベネフィット）がタイトルから読み取れません。\n改善：「〇〇が△△%改善」「〇〇を実現」など、読んだ後の変化を具体的にタイトルに盛り込みましょう。",
    "t2": "課題：コピーライティングの観点でも重要な『新情報性』や、『好奇心』を刺激する要素がなく、スルーされやすい状態です。\n改善：数字・意外性・問いかけのいずれかを入れ、「読まずにいられない」タイトルに変えましょう。",
    "t3": "課題：タイトルで読者を絞り込めておらず、刺さるべき相手に届かず素通りされています。\n改善：想定する読者の状況（業種・規模・抱えている問題）をタイトルに反映させると、該当する読者のクリック率が上がります。",
    "l1": "課題：冒頭で『誰の・何の課題が・どう解決されたか』が伝わらず、読者が読み進める理由を見失います。\n改善：最初の3段落以内に導入事例の核心を凝縮して置き、読者が『続きを読む価値がある』と判断できる構成にしましょう。",
    "l2": "課題：冒頭で読者が『自分向けの記事かどうか』を判断できず、ペルソナ以外の読者に読まれて終わるリスクがあります。\n改善：読者が置かれている状況や抱えがちな問題を冒頭に置き、『これは自分に関係ある』と判断できる入り口を作りましょう。",
    "c1": "課題：記事を読み終えた読者が次に何をすべきか分からず、読まれても商談につながりません。\n改善：問い合わせ・資料請求など具体的なアクションへの導線を記事末尾に必ず置きましょう。",
    "c2": "課題：CTAが記事の感情的な流れと断絶しており、読者の購買意欲が冷めたまま終わっています。\n改善：記事で高まった共感・納得感を受け取る形でCTAを設計し、感情の流れを途切れさせない導線にしましょう。",
    "r1": "課題：顧客企業の情報が不明確で、読者が『自社に近い事例かどうか』を判断できません。\n改善：業種・規模・担当者名を明記し、読者が自社との共通点を見つけられるようにしましょう。",
    "r2": "課題：担当者の生の言葉がなく、記事全体がサービス提供側の主張に見えてしまっています。\n改善：担当者の発言を直接引用し、第三者の声として信頼性を担保しましょう。",
    "v1": "課題：見出し構成が不明確で、忙しい読者が流し読みで内容を把握できません。\n改善：見出しだけ読んでも記事の流れが分かるよう、各見出しに『何が書いてあるか』を凝縮した言葉を入れましょう。",
    "p1": "課題：課題の描写が表面的で、読者が自社の状況と重ねにくい記事になっています。\n改善：導入前にどんな損失・非効率・リスクが発生していたかを具体的に書くと、読者が自社の課題と照らし合わせやすくなります。",
    "p2": "課題：課題の原因・背景が書かれておらず、読者が自社への置き換えができません。\n改善：『なぜその課題が起きていたのか』という構造的な背景まで書き、読者が『うちも同じ構造だ』と気づける記述にしましょう。",
    "s1": "課題：なぜこのサービスを選んだかの経緯がなく、読者が『自社に向いているかどうか』を判断できません。\n改善：導入を決めた経緯・きっかけを具体的に書き、読者が選定の判断基準として活用できる内容にしましょう。",
    "s2": "課題：選定時の迷い・比較・判断プロセスが描写されておらず、読者の共感が生まれません。\n改善：『他社と比較した点』『導入をためらった理由』など意思決定のリアルなプロセスを入れ、読者が自分の検討状況と重ねられるようにしましょう。",
    "e1": "課題：定量的な成果がなく、読者がサービスの効果を具体的にイメージできません。\n改善：数値・％・時間など測定可能な成果を入れ、上司や決裁者への説明材料としても使える記事にしましょう。",
    "e2": "課題：定性的な変化がなく、記事がデータの羅列に見えてしまっています。\n改善：現場の声・感情の変化・雰囲気の変化を入れ、読者が『自分もこうなりたい』と感じる感情的な動機を作りましょう。",
    "st1": "課題：導入前→中→後のストーリーアークがなく、記事全体がただの結果報告になっています。\n改善：変化のプロセスを時系列で描き、読者が『導入してからどう変わっていったか』を追体験できる構成にしましょう。",
    "st2": "課題：取材先だけの固有の話で終わっており、同じ業界の別会社や異なる業種の読者が『自社にも当てはまる』と感じにくい記事になっています。\n改善：取材先が解決した課題の中に、読者が『これは自分も抱えている悩みだ』『自社でも同じアプローチが使えそうだ』と気づける要素を意識的に書き込みましょう。",
    "pe1": "課題：想定読者の業界・職種・課題が文章に反映されておらず、誰に向けた記事か分かりにくくなっています。\n改善：読者が日常的に直面している状況や言葉を使うことで、『これは自分向けの記事だ』と伝わる記事になります。",
    "pe2": "課題：具体的な描写が薄く、読者が記事を他人事として読み終えてしまいます。\n改善：現場の具体的なシーン・担当者の発言・実際に起きた状況を盛り込むと、読者が自社の状況と重ねやすくなります。"
  };

  const checkItems = document.querySelectorAll('.check-item');
  const scoreCount = document.getElementById('scoreCount');
  const scoreBarFill = document.getElementById('scoreBarFill');
  const scorePercent = document.getElementById('scorePercent');
  const outsideCount = document.getElementById('outsideCount');
  const insideCount = document.getElementById('insideCount');
  const resultPanel = document.getElementById('resultPanel');
  const rankBanner = document.getElementById('rankBanner');
  const rankLetter = document.getElementById('rankLetter');
  const rankMessage = document.getElementById('rankMessage');
  const resultBody = document.getElementById('resultBody');

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    });
  });

  // Check toggle
  checkItems.forEach(item => {
    item.addEventListener('click', function(e) {
      const cb = this.querySelector('input[type="checkbox"]');
      cb.checked = !cb.checked;
      this.classList.toggle('checked', cb.checked);
      updateScore();
    });
  });

  function getScore() {
    let total = 0;
    checkItems.forEach(item => {
      if (item.querySelector('input').checked) total++;
    });
    return total;
  }

  function getGroupCount(group) {
    let checked = 0, all = 0;
    checkItems.forEach(item => {
      if (item.dataset.group === group) {
        all++;
        if (item.querySelector('input').checked) checked++;
      }
    });
    return { checked, all };
  }

  function getCategoryStatus() {
    const cats = {};
    checkItems.forEach(item => {
      const cat = item.dataset.category;
      const id = item.dataset.id;
      if (!cats[cat]) cats[cat] = { total: 0, checked: 0, uncheckedIds: [] };
      cats[cat].total++;
      if (item.querySelector('input').checked) {
        cats[cat].checked++;
      } else {
        cats[cat].uncheckedIds.push(id);
      }
    });
    return cats;
  }

  function updateScore() {
    const score = getScore();
    const pct = Math.round((score / TOTAL) * 100);
    scoreCount.textContent = score;
    scoreBarFill.style.width = pct + '%';
    scorePercent.textContent = pct + '%';

    const outside = getGroupCount('outside');
    const inside = getGroupCount('inside');
    outsideCount.textContent = outside.checked + '/' + outside.all;
    insideCount.textContent = inside.checked + '/' + inside.all;

    // Update category counts
    document.querySelectorAll('[data-cat-count]').forEach(el => {
      const cat = el.dataset.catCount;
      const items = document.querySelectorAll(`.check-item[data-category="${cat}"]`);
      let c = 0;
      items.forEach(i => { if (i.querySelector('input').checked) c++; });
      el.textContent = c + '/' + items.length;
    });

    // Hide result if score changes after showing
    resultPanel.style.display = 'none';
  }

  // Diagnose
  document.getElementById('btnDiagnose').addEventListener('click', function() {
    const score = getScore();
    let rank, rankClass, message;

    if (score >= 19) {
      rank = 'A'; rankClass = 'rank-a';
      message = '商談化に近い記事です。あと一歩で強力な営業資産になります。';
    } else if (score >= 14) {
      rank = 'B'; rankClass = 'rank-b';
      message = '改善で大きく伸びる余地があります。';
    } else if (score >= 8) {
      rank = 'C'; rankClass = 'rank-c';
      message = '設計から見直すと成果が変わります。';
    } else {
      rank = 'D'; rankClass = 'rank-d';
      message = '記事の構造を根本から整える必要があります。';
    }

    rankBanner.className = 'rank-banner ' + rankClass;
    rankLetter.textContent = rank + ' ランク';
    rankLetter.style.animation = 'none';
    rankLetter.offsetHeight; // reflow
    rankLetter.style.animation = '';
    rankMessage.textContent = message;

    // Build improvement report
    const cats = getCategoryStatus();
    let html = '';

    // Find priority areas (most unchecked)
    const catEntries = Object.entries(cats);
    let maxUnchecked = 0;
    catEntries.forEach(([, v]) => { if (v.uncheckedIds.length > maxUnchecked) maxUnchecked = v.uncheckedIds.length; });

    // Separate priority / improvement / cleared
    const priorityAreas = catEntries.filter(([, v]) => v.uncheckedIds.length === maxUnchecked && maxUnchecked > 0);
    const otherImprovement = catEntries.filter(([, v]) => v.uncheckedIds.length > 0 && v.uncheckedIds.length < maxUnchecked);
    const cleared = catEntries.filter(([, v]) => v.uncheckedIds.length === 0);

    // Priority areas
    if (priorityAreas.length > 0) {
      html += '<div class="result-section"><div class="result-section-title">最優先の改善エリア</div>';
      priorityAreas.forEach(([cat, data]) => {
        html += '<div class="priority-area">';
        html += '<div class="area-title">' + cat + '（' + data.uncheckedIds.length + '/' + data.total + ' 未チェック）</div>';
        html += '<ul class="improve-list">';
        data.uncheckedIds.forEach(id => {
          html += '<li>' + (diagnosticComments[id] || id).replace(/\n/g, '<br>') + '</li>';
        });
        html += '</ul></div>';
      });
      html += '</div>';
    }

    // Other improvement areas
    if (otherImprovement.length > 0) {
      html += '<div class="result-section"><div class="result-section-title">改善が必要な箇所</div>';
      otherImprovement.sort((a, b) => b[1].uncheckedIds.length - a[1].uncheckedIds.length);
      otherImprovement.forEach(([cat, data]) => {
        html += '<div style="padding:0.6rem 0;">';
        html += '<div style="font-weight:700;font-size:0.9rem;color:var(--navy);margin-bottom:0.3rem;">' + cat + '（' + data.uncheckedIds.length + '/' + data.total + ' 未チェック）</div>';
        html += '<ul class="improve-list">';
        data.uncheckedIds.forEach(id => {
          html += '<li>' + (diagnosticComments[id] || id).replace(/\n/g, '<br>') + '</li>';
        });
        html += '</ul></div>';
      });
      html += '</div>';
    }

    // Cleared categories
    if (cleared.length > 0) {
      html += '<div class="result-section"><div class="result-section-title">クリア済みカテゴリ</div>';
      cleared.forEach(([cat]) => {
        html += '<div class="cleared-area">&#10003; ' + cat + '　クリア</div>';
      });
      html += '</div>';
    }

    resultBody.innerHTML = html;
    resultPanel.style.display = 'block';
    resultPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // PDF Download - build standalone HTML with no CSS variables
  document.getElementById('btnPdf').addEventListener('click', function() {
    var btn = this;
    btn.textContent = '⏳ PDF生成中...';
    btn.disabled = true;

    var score = getScore();
    var rank, rankBg, msg;
    if (score >= 19) { rank = 'A'; rankBg = 'linear-gradient(135deg,#1a6b3c,#27ae60)'; msg = '商談化に近い記事です。あと一歩で強力な営業資産になります。'; }
    else if (score >= 14) { rank = 'B'; rankBg = 'linear-gradient(135deg,#1a5276,#2e86c1)'; msg = '改善で大きく伸びる余地があります。'; }
    else if (score >= 8) { rank = 'C'; rankBg = 'linear-gradient(135deg,#7d5a00,#c9a84c)'; msg = '設計から見直すと成果が変わります。'; }
    else { rank = 'D'; rankBg = 'linear-gradient(135deg,#922b21,#e74c3c)'; msg = '記事の構造を根本から整える必要があります。'; }

    var cats = getCategoryStatus();
    var catEntries = Object.entries(cats);
    var maxU = 0;
    catEntries.forEach(function(e) { if (e[1].uncheckedIds.length > maxU) maxU = e[1].uncheckedIds.length; });

    var html = '';
    html += '<div style="font-family:\'Noto Sans JP\',sans-serif;color:#1a2340;line-height:1.7;max-width:700px;margin:0 auto;">';

    // Header
    html += '<div style="background:#1a2340;padding:20px;text-align:center;border-radius:12px 12px 0 0;">';
    html += '<div style="color:#c9a84c;font-size:18px;font-weight:900;">導入事例 自己診断チェックリスト</div>';
    html += '<div style="color:#9298a5;font-size:11px;margin-top:4px;">診断結果レポート ─ ' + new Date().toLocaleDateString('ja-JP') + '</div>';
    html += '</div>';

    // Rank
    html += '<div style="background:' + rankBg + ';padding:30px 20px;text-align:center;color:#fff;">';
    html += '<div style="font-size:13px;opacity:0.85;">あなたの導入事例記事の評価</div>';
    html += '<div style="font-size:48px;font-weight:900;margin:8px 0;">' + rank + ' ランク</div>';
    html += '<div style="font-size:14px;opacity:0.9;">' + msg + '</div>';
    html += '<div style="font-size:12px;margin-top:8px;opacity:0.7;">スコア: ' + score + ' / 22 項目</div>';
    html += '</div>';

    // Body
    html += '<div style="padding:20px;background:#fff;">';

    // Priority areas
    var priorities = catEntries.filter(function(e) { return e[1].uncheckedIds.length === maxU && maxU > 0; });
    var others = catEntries.filter(function(e) { return e[1].uncheckedIds.length > 0 && e[1].uncheckedIds.length < maxU; });
    var cleared = catEntries.filter(function(e) { return e[1].uncheckedIds.length === 0; });
    others.sort(function(a, b) { return b[1].uncheckedIds.length - a[1].uncheckedIds.length; });

    if (priorities.length > 0) {
      html += '<div style="font-size:14px;font-weight:700;color:#e74c3c;margin-bottom:10px;">■ 最優先の改善エリア</div>';
      priorities.forEach(function(entry) {
        html += '<div style="background:rgba(231,76,60,0.08);border-left:4px solid #e74c3c;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px;">';
        html += '<div style="font-weight:700;color:#e74c3c;font-size:13px;margin-bottom:6px;">' + entry[0] + '（' + entry[1].uncheckedIds.length + '/' + entry[1].total + ' 未チェック）</div>';
        entry[1].uncheckedIds.forEach(function(id) {
          var c = diagnosticComments[id] || id;
          html += '<div style="font-size:12px;color:#6b7280;margin-bottom:6px;padding-left:12px;border-left:2px solid #ddd;">' + c.replace(/\n/g, '<br>') + '</div>';
        });
        html += '</div>';
      });
    }

    if (others.length > 0) {
      html += '<div style="font-size:14px;font-weight:700;color:#1a2340;margin:16px 0 10px;">■ 改善が必要な箇所</div>';
      others.forEach(function(entry) {
        html += '<div style="margin-bottom:12px;">';
        html += '<div style="font-weight:700;color:#1a2340;font-size:13px;margin-bottom:6px;">' + entry[0] + '（' + entry[1].uncheckedIds.length + '/' + entry[1].total + ' 未チェック）</div>';
        entry[1].uncheckedIds.forEach(function(id) {
          var c = diagnosticComments[id] || id;
          html += '<div style="font-size:12px;color:#6b7280;margin-bottom:6px;padding-left:12px;border-left:2px solid #ddd;">' + c.replace(/\n/g, '<br>') + '</div>';
        });
        html += '</div>';
      });
    }

    if (cleared.length > 0) {
      html += '<div style="font-size:14px;font-weight:700;color:#27ae60;margin:16px 0 10px;">■ クリア済みカテゴリ</div>';
      cleared.forEach(function(entry) {
        html += '<div style="background:rgba(39,174,96,0.08);border-left:4px solid #27ae60;border-radius:0 8px 8px 0;padding:8px 12px;margin-bottom:6px;font-size:13px;color:#27ae60;font-weight:700;">✓ ' + entry[0] + '　クリア</div>';
      });
    }

    html += '</div>';

    // Footer
    html += '<div style="background:#f4f5f7;padding:24px 20px;text-align:center;border-radius:0 0 12px 12px;">';
    html += '<div style="border:2px solid #c9a84c;border-radius:8px;padding:20px;margin:0 auto;max-width:500px;">';
    html += '<div style="font-size:13px;color:#1a2340;margin-bottom:4px;">改善の優先順位と次の打ち手を、15分で確定します。</div>';
    html += '<div style="font-size:11px;color:#6b7280;margin-bottom:14px;">診断結果と記事URLを前提に、次の一手だけ決めます。</div>';
